# .github/workflows/generate-config.yml (اصلاح‌شده)
name: Generate Config

on:
  schedule:
    - cron: '0 */12 * * *'   # هر ۱۲ ساعت
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Codespace and fetch links
        env:
          GH_TOKEN: "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"
        run: |
          # ایجاد Codespace و گرفتن نام آن از خروجی (آخرین خط)
          codespace_name=$(gh codespace create --repo ${{ github.repository }} --branch main 2>&1 | tail -1)
          echo "Created codespace: $codespace_name"

          # منتظر فعال شدن Codespace (حداکثر ۵ دقیقه)
          for i in $(seq 1 30); do
            state=$(gh codespace list --json name,state -q ".[] | select(.name==\"$codespace_name\") | .state")
            if [ "$state" = "Available" ]; then
              break
            fi
            sleep 10
          done

          # انتظار تکمیلی تا فایل لینک‌ها ساخته شود
          for i in $(seq 1 12); do
            if gh codespace ssh --codespace "$codespace_name" -- test -f /tmp/vless-links.txt 2>/dev/null; then
              break
            fi
            sleep 10
          done

          # دریافت فایل لینک‌ها
          gh codespace ssh --codespace "$codespace_name" -- cat /tmp/vless-links.txt > links.tmp
          
          # توقف Codespace
          gh codespace stop --codespace "$codespace_name"

      - name: Update config.md
        run: |
          {
            echo "# Latest VLESS Configs"
            echo "Generated at $(date -u)"
            echo '```'
            cat links.tmp
            echo '```'
          } > config.md

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add config.md
          git diff --staged --quiet || git commit -m "Update config.md [skip ci]"
          git push
