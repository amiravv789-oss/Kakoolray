# .github/workflows/generate-config.yml
name: Generate Config

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify gh auth for codespaces
        env:
          GH_TOKEN: "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"
        run: |
          if ! gh auth status 2>&1 | grep -q 'codespace'; then
            echo "::error::توکن CODESPACE_TOKEN فاقد دسترسی codespace است. لطفاً توکن را اصلاح کنید."
            exit 1
          fi

      - name: Create and wait for codespace
        env:
          GH_TOKEN: "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"
        run: |
          echo "Creating codespace..."
          # ایجاد codespace و انتظار برای آماده شدن (‌timeout: 10 دقیقه)
          timeout 600 gh codespace create \
            --repo ${{ github.repository }} \
            --branch main \
            --machine basicLinux32gb \
            --wait 2>&1 | tee create.log
          echo "Codespace created."

      - name: Get new codespace name
        id: getname
        env:
          GH_TOKEN: "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"
        run: |
          # دریافت آخرین codespace ساخته‌شده که Available است
          CODESPACE_NAME=$(gh codespace list \
            --json name,state,createdAt \
            --jq 'max_by(.createdAt) | select(.state=="Available") | .name')
          if [ -z "$CODESPACE_NAME" ]; then
            echo "::error::هیچ codespace فعالی پیدا نشد."
            exit 1
          fi
          echo "name=$CODESPACE_NAME" >> $GITHUB_OUTPUT

      - name: Wait for vless-links.txt and fetch it
        env:
          GH_TOKEN: "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"
          CODESPACE_NAME: ${{ steps.getname.outputs.name }}
        run: |
          echo "Waiting for /tmp/vless-links.txt..."
          for i in $(seq 1 30); do
            if gh codespace ssh --codespace "$CODESPACE_NAME" -- test -f /tmp/vless-links.txt 2>/dev/null; then
              break
            fi
            sleep 10
          done
          gh codespace ssh --codespace "$CODESPACE_NAME" -- cat /tmp/vless-links.txt > links.tmp

      - name: Stop codespace
        env:
          GH_TOKEN: "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"
          CODESPACE_NAME: ${{ steps.getname.outputs.name }}
        run: |
          gh codespace stop --codespace "$CODESPACE_NAME"

      - name: Update config.md
        run: |
          {
            echo "# Latest VLESS Configs"
            echo "Generated at $(date -u)"
            echo '```'
            cat links.tmp
            echo '```'
          } > config.md

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add config.md
          git diff --staged --quiet || git commit -m "Update config.md [skip ci]"
          git push
